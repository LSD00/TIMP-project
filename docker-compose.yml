version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: antimarazm_db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret_db_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: antimarazm_server
    depends_on:
      - db
    ports:
      - "8080:8080"
    volumes:
      # Прокидываем конфигурацию внутрь контейнера
      - ./config.ini:/app/config.ini
    restart: unless-stopped

volumes:
  pgdata: